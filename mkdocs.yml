site_name: asmltr
site_url: https://jarethmt.github.io/asmltr/
site_description: One channel-agnostic AI-assistant backend behind every chat surface — with a live insights dashboard.
repo_url: https://github.com/jarethmt/asmltr
repo_name: jarethmt/asmltr
docs_dir: docs

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: pink
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: pink
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - How it works: how-it-works.md
  - Getting Started:
    - What is asmltr?: getting-started/overview.md
    - Installation: getting-started/install.md
    - Quick Start: getting-started/quickstart.md
  - Architecture: architecture.md
  - Connectors:
    - Overview: connectors/index.md
    - Discord: connectors/discord.md
    - Telegram: connectors/telegram.md
    - MCP: connectors/mcp.md
    - GitHub: connectors/github.md
    - OpenAI-compatible: connectors/openai.md
    - CLI sessions: connectors/cli.md
  - Operating:
    - The asmltr CLI: cli.md
    - The dashboard: dashboard.md
    - Versioning & updates: UPDATER-DESIGN.md
    - Testing the updater: testing-the-updater.md
  - Coordination:
    - Steering & injection: coordination/injection.md
    - Cross-channel send: coordination/cross-channel.md
    - Announcements: coordination/announcements.md
    - Session awareness: coordination/awareness.md
  - Vision & design:
    - The cast — identity & trust: CAST.md
    - Access evolution (roadmap): ACCESS-EVOLUTION.md
    - Federation: FEDERATION.md
    - Vault · silos · backups (roadmap): ROADMAP-VAULT-SILOS-BACKUP.md
  - Security:
    - Trust & permissions: security/trust.md
    - Moderation: security/moderation.md
    - Secrets & config: security/secrets.md
  - Reference:
    - Configuration: reference/config.md
    - HTTP endpoints: reference/api.md
  - Deployment:
    - The dashboard: deployment/dashboard.md
