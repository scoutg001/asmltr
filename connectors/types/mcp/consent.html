<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>__ASSISTANT__ - Authorization</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .authorization-info {
            background: #f7f9fc;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .client-name {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
        }

        .permissions {
            list-style: none;
        }

        .permissions li {
            padding: 12px 0;
            border-bottom: 1px solid #e1e8ed;
            color: #666;
            font-size: 14px;
        }

        .permissions li:last-child {
            border-bottom: none;
        }

        .permissions li::before {
            content: "✓";
            color: #667eea;
            font-weight: bold;
            margin-right: 12px;
        }

        .warning {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
            font-size: 13px;
            color: #856404;
        }

        .warning strong {
            display: block;
            margin-bottom: 8px;
        }

        .buttons {
            display: flex;
            gap: 12px;
        }

        button {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-approve {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-approve:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-deny {
            background: #f1f3f5;
            color: #666;
        }

        .btn-deny:hover {
            background: #e9ecef;
        }

        .error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            border-radius: 8px;
            padding: 16px;
            color: #721c24;
            margin-bottom: 24px;
        }

        .loading {
            text-align: center;
            color: #666;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🔮 __ASSISTANT__</h1>
            <p>Deep reasoning as a service</p>
        </div>

        <div id="content">
            <!-- Dynamic content will be inserted here -->
        </div>
    </div>

    <script>
        // Parse URL parameters
        const params = new URLSearchParams(window.location.search);
        const clientId = params.get('client_id');
        const redirectUri = params.get('redirect_uri');
        const state = params.get('state');
        const codeChallenge = params.get('code_challenge');
        const codeChallengeMethod = params.get('code_challenge_method');
        const resource = params.get('resource');
        const responseType = params.get('response_type');

        const content = document.getElementById('content');

        // Fetch client information
        async function loadClientInfo() {
            // Validate required parameters (resource is optional)
            if (!clientId || !redirectUri || !codeChallenge) {
                content.innerHTML = `
                    <div class="error">
                        <strong>Invalid Authorization Request</strong>
                        <p>Missing required parameters. Please contact the application developer.</p>
                    </div>
                `;
                return;
            }
            content.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading authorization request...</p>
                </div>
            `;

            try {
                // In a real implementation, fetch client details from the server
                // For now, we'll use the client_id directly
                const clientName = decodeURIComponent(params.get('client_name') || clientId);

                showConsentForm(clientName);
            } catch (error) {
                content.innerHTML = `
                    <div class="error">
                        <strong>Error</strong>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        function showConsentForm(clientName) {
            content.innerHTML = `
                <div class="authorization-info">
                    <div class="client-name">${clientName}</div>
                    <p style="color: #666; margin-bottom: 16px; font-size: 14px;">
                        is requesting access to __ASSISTANT__
                    </p>
                    <ul class="permissions">
                        <li>Ask questions and receive deep reasoning responses</li>
                        <li>Access to system tools and capabilities</li>
                        <li>Conversation context and memory</li>
                    </ul>
                </div>

                <div class="warning">
                    <strong>⚠️ Security Notice</strong>
                    __ASSISTANT__ has full system access and can execute commands, read files,
                    and perform operations on behalf of authorized users. Only approve this
                    request if you trust <strong>${clientName}</strong>.
                </div>

                <div class="buttons">
                    <button class="btn-deny" onclick="denyAccess()">Deny</button>
                    <button class="btn-approve" onclick="approveAccess()">Approve</button>
                </div>
            `;
        }

        async function approveAccess() {
            content.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Authorizing...</p>
                </div>
            `;

            try {
                // Post approval to server
                const response = await fetch('/oauth/approve', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        client_id: clientId,
                        redirect_uri: redirectUri,
                        code_challenge: codeChallenge,
                        code_challenge_method: codeChallengeMethod,
                        resource: resource,
                        state: state,
                        approved: true,
                    }),
                });

                const data = await response.json();

                if (data.redirect_url) {
                    // Redirect to client with authorization code
                    window.location.href = data.redirect_url;
                } else if (data.error) {
                    throw new Error(data.error_description || data.error);
                }
            } catch (error) {
                content.innerHTML = `
                    <div class="error">
                        <strong>Authorization Error</strong>
                        <p>${error.message}</p>
                    </div>
                    <div class="buttons" style="margin-top: 16px;">
                        <button class="btn-deny" onclick="location.reload()">Try Again</button>
                    </div>
                `;
            }
        }

        function denyAccess() {
            // Redirect to client with error
            const errorUrl = new URL(redirectUri);
            errorUrl.searchParams.set('error', 'access_denied');
            errorUrl.searchParams.set('error_description', 'User denied authorization');
            if (state) {
                errorUrl.searchParams.set('state', state);
            }
            window.location.href = errorUrl.toString();
        }

        // Load client info on page load
        loadClientInfo();
    </script>
</body>
</html>
